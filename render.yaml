services:
  - type: web
    name: cobalt-core
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # you'll paste this in the Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: cobalt-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value

databases:
  - name: cobalt-db
    databaseName: cobalt
    user: cobalt
    plan: free
